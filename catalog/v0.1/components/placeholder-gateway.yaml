apiVersion: yara.dev/v1alpha1
kind: Component
metadata:
  id: core.placeholder-gateway
  version: 1.0.0
spec:
  roles:
    - gateway.openai-compatible
  provides:
    - chat
  consumes:
    - integration.api.openai-chat/v1
  apiContracts:
    - integration.api.openai-chat/v1
  runtimeOverheadGiB: 0.25
  policy:
    openSource: true
    externalEgress: false
    telemetry: false
    artifactVerified: true
