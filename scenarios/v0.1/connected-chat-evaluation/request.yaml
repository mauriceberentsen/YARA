apiVersion: yara.dev/v1alpha1
kind: PlatformRequest
metadata:
    name: connected-chat-evaluation
spec:
    useCases:
        - id: chat
          required: true
    workload:
        expectedUsers: 50
        peakConcurrentRequests: 10
        maximumContextTokens: 16384
    environment:
        connectivity: connected
        inventoryRef: connected-chat-evaluation-inventory
        lifecycle: evaluation
    policies:
        openSourceOnly: true
        externalEgress: allowed
        telemetry: allowed
        artifactVerification: preferred
    objectives:
        preset: balanced
        weights:
            quality: 0.3
            latency: 0.1
            throughput: 0.1
            cost: 0.05
            simplicity: 0.3
            energy: 0.05
            evidenceConfidence: 0.1
    preferences:
        deploymentTarget: local-containers
