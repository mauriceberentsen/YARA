apiVersion: yara.dev/v1alpha1
kind: PlatformPlan
metadata:
  name: private-coding-assistant
  planId: sha256:c72148e57525654494cad2f4cd69d3f5291dcc4c63719af57b6e5d782f3f1b2f
provenance:
  requestDigest: sha256:c90e734a40a7f140a6da736ecf414b49734559aab1ffe70cca3271d977523562
  inventoryDigest: sha256:1fd03c0969798ca71c206bf06dbdfe284cd52d0024393ed2c09a8404117badbb
  catalogDigest: sha256:b298dcab33c8e33ea82198dd2cd131c307b4002958a399fc4b2951ec12810d6f
  plannerVersion: 0.1.0-dev
spec:
  status: review-required
  topology:
    instances:
      - id: gateway
        role: gateway.openai-compatible
        componentRef: core.placeholder-gateway@1.0.0
        placement: host-1
        apiContracts:
          - integration.api.openai-chat/v1
      - id: inference
        role: inference.text-generation
        componentRef: core.placeholder-runtime@1.0.0
        modelRef: core.placeholder-coder-q4@1.0.0
        placement: host-1/gpu-0
        apiContracts:
          - integration.api.openai-chat/v1
    connections:
      - from: gateway
        to: inference
        contract: integration.api.openai-chat/v1
    deploymentStages:
      - [inference]
      - [gateway]
  allocations:
    - instanceId: inference
      acceleratorId: gpu-0
      estimatedMemoryGiB: 19.2
      allocatableMemoryGiB: 22
  decisions:
    - id: decision.inference
      selected: core.placeholder-coder-small
      reasons:
        - "Fits accelerator memory with cataloged headroom: 19.20 GiB required of 22.00 GiB allocatable."
        - Satisfies all required capabilities and effective policies.
        - Has the highest soft preference score among feasible candidates.
      evidence:
        - fixture.small-memory-model
      alternatives:
        - id: core.placeholder-coder-large
          outcome: rejected
          code: YARA-HW-004
          reason: Estimated accelerator memory 30.72 GiB exceeds 22.00 GiB allocatable memory.
          estimatedGiB: 30.72
          availableGiB: 22
          preferenceScore: 0.95
    - id: decision.topology
      selected: core.private-chat-coding
      reasons:
        - Template satisfies all required use cases and defines an acyclic abstract role graph.
      evidence:
        - core.private-chat-coding
      alternatives: []
    - id: decision.gateway
      selected: core.placeholder-gateway
      reasons:
        - Component implements the abstract role, required interfaces and effective policies.
      evidence:
        - core.placeholder-gateway
      alternatives: []
  diagnostics:
    - code: YARA-CAT-040
      severity: warning
      message: Conflicting compatibility assertions quarantined this runtime, model and hardware combination.
      paths:
        - core.placeholder-coder-conflicted-negative
        - core.placeholder-coder-conflicted-positive
      remediation:
        - Review the cited assertions and publish a new catalog snapshot with the conflict resolved.
    - code: YARA-INV-002
      severity: warning
      message: Accelerator driver compatibility must be verified before apply.
      paths:
        - spec.hosts[0].accelerators[0].driverVersion
