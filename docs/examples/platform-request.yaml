apiVersion: yara.dev/v1alpha1
kind: PlatformRequest
metadata:
  name: private-coding-assistant
spec:
  useCases:
    - id: coding
      required: true
    - id: chat
      required: true
  workload:
    expectedUsers: 25
    peakConcurrentRequests: 6
    maximumContextTokens: 16384
  environment:
    connectivity: air-gapped
    inventoryRef: local-lab
    lifecycle: evaluation
  policies:
    openSourceOnly: true
    externalEgress: forbidden
    telemetry: forbidden
    artifactVerification: required
  objectives:
    preset: balanced
    weights:
      quality: 0.30
      latency: 0.10
      throughput: 0.10
      cost: 0.05
      simplicity: 0.30
      energy: 0.05
      evidenceConfidence: 0.10
  preferences:
    deploymentTarget: local-containers
