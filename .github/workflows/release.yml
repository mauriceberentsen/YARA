name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  RELEASE_NOTES_TEMPLATE: .github/release-notes/v0.1.0-alpha.1.md

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: false

      - name: Verify release notes template
        run: test -f "${RELEASE_NOTES_TEMPLATE}"

      - name: Run GoReleaser (snapshot dry-run)
        if: github.event_name == 'workflow_dispatch'
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --snapshot --skip=publish --release-notes "${{ env.RELEASE_NOTES_TEMPLATE }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser (tag publish)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --release-notes "${{ env.RELEASE_NOTES_TEMPLATE }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
