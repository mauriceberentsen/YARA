name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run repository checks
        run: make check

      - name: Run race tests
        run: go test -race ./...

      - name: Validate schema documents (draft 2020-12)
        run: |
          python -m pip install --upgrade pip
          python -m pip install jsonschema
          python - <<'PY'
          import glob
          import json
          import sys
          from jsonschema.validators import Draft202012Validator

          schema_files = sorted(glob.glob("schemas/yara.dev/v1alpha1/*.schema.json"))
          if not schema_files:
              print("No schema files found under schemas/yara.dev/v1alpha1")
              sys.exit(1)

          errors = []
          for path in schema_files:
              with open(path, "r", encoding="utf-8") as handle:
                  schema = json.load(handle)
              if schema.get("$schema") != "https://json-schema.org/draft/2020-12/schema":
                  errors.append(f"{path}: unexpected $schema value {schema.get('$schema')!r}")
                  continue
              try:
                  Draft202012Validator.check_schema(schema)
              except Exception as exc:  # pragma: no cover
                  errors.append(f"{path}: {exc}")

          if errors:
              print("Schema validation failed:")
              for error in errors:
                  print(f"- {error}")
              sys.exit(1)

          print(f"Validated {len(schema_files)} draft-2020-12 schemas.")
          PY

      - name: Check diff formatting
        run: git diff --check
